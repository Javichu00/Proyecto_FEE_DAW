<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportXtreme - Acceso</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="body-acceso">

   
    <header id="inicio">
        <a href="./index.html"><img class="img-logo" src="MEDIA/logo-recortado.png"></a>
        <div>
            <a href="./reservas.html" class="btn-menu btn-reservas">Mis Reservas</a>
            <a href="./acceso.html" class="btn-menu btn-acceder">Acceder</a>
        </div>
    </header>
    
    
    <nav class="main-nav">
        <ul class="nav-list">
            <li><a href="index.html">Inicio</a></li> 
            <li><a href="show.html">Shows</a></li>
            <li><a href="actividad.html">Actividades</a></li>
            <li><a href="curso.html">Cursos</a></li>
        </ul>
    </nav>

   
    <div class="access-login">
        <div class="login-box">

        
            <div class="tabs">
                <button class="tab active" onclick="showTab('register', this)">Registrarse</button>
                <button class="tab" onclick="showTab('login', this)">Iniciar Sesión</button>
            </div>

           
            <div id="register" class="tab-content">
                <h2>Crear una cuenta</h2>
                <input type="text" id="reg-nombre" placeholder="Nombre completo">
                <input type="email" id="reg-email" placeholder="Correo electrónico">
                <div class="input-pass">
                    <input type="password" id="pass1" placeholder="Contraseña">
                    <button type="button" class="toggle-pass" onclick="togglePass('pass1', this)">👁️</button>
                </div>
                <div class="input-pass">
                    <input type="password" id="pass2" placeholder="Confirmar contraseña">
                    <button type="button" class="toggle-pass" onclick="togglePass('pass2', this)">👁️</button>
                </div>  
                <button onclick="register()" class="btn-submit">Registrarse</button>
            </div>

            <div id="login" class="tab-content hidden">
                <br>
                <br>   
                <h2>Bienvenido de nuevo</h2>
                <input type="email" id="login-email" placeholder="Correo electrónico">
                <div class="input-pass">
                    <input type="password" id="pass3" placeholder="Contraseña">
                    <button type="button" class="toggle-pass" onclick="togglePass('pass3', this)">👁️</button>
                </div>

                <button onclick="login()" class="btn-submit">Entrar</button>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
    <script src="scriptAPI_IP.js"></script>
    <script src="scriptAcceso.js"></script>

</body>
</html>
