server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    location /api/ {
        proxy_pass https://backendfee-production.up.railway.app/;
        proxy_set_header Host backendfee-production.up.railway.app;
        proxy_ssl_server_name on;
    }
}