<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportXtreme - Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="stylesAdmn.css">
</head>
<body>

    <header id="inicio">
        <img class="img-logo" src="MEDIA/logo-recortado.png">
        <div>
            <a href="./acceso.html" class="btn-menu btn-acceder">Acceder</a>
        </div>
    </header>   

    
    <nav class="main-nav">
        <div>
            <ul class="nav-list">
                <li><button class="admin-tab active" onclick="cambiarTabla('eventos')">Eventos</button></li> <!---->
                <li><button class="admin-tab" onclick="cambiarTabla('usuarios')">Usuarios</button></li>
                <li><button class="admin-tab" onclick="cambiarTabla('reservas')">Reservas</button></li>
            </ul>
        </div>
    </nav>
        
    <main class="dashboard-container">
      
        <div class="filters-bar">
            <input type="text" id="admin-buscador" placeholder="Buscar..." class="search-input"
                oninput="filtrarTabla()">
        </div>

        <div class="admin-tablas-contenedor">

         
            <div id="tabla-eventos" class="admin-tabla-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Foto</th>
                            <th>Tipo</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>F. Inicio</th>
                            <th>F. Fin</th>
                            <th>Localización</th>
                            <th>Aforo</th>
                            <th>Estado</th>
                            <th>Precio</th>
                            <th>Categoría</th>
                            <th>Extremidad</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-eventos"></tbody>
                </table>
            </div>
    
            
            <div id="tabla-usuarios" class="admin-tabla-wrapper hidden">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre Completo</th>
                            <th>Email</th>
                            <th>Password</th>
                            <th>Enabled</th>
                            <th>Fecha Registro</th>
                            <th>Perfil</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-usuarios"></tbody>
                </table>
            </div>
    
            
            <div id="tabla-reservas" class="admin-tabla-wrapper hidden">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Usuario</th>
                            <th>Evento</th>
                            <th>Precio Venta</th>
                            <th>Cantidad</th>
                            <th>Observaciones</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-reservas"></tbody>
                </table>
            </div>
    
        </div>
    </main>

    <script src="scriptAPI_IP.js"></script>
    <script src="script.js"></script>
    <script src="scriptAdmn.js"></script>
</body>
</html>
